services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    networks:
      - auditor-network
    depends_on:
      - redis  # Force backend to wait until Redis is up

  frontend:
    image: node:22-slim
    working_dir: /app/frontend
    volumes:
      - .:/app
    ports:
      - "4321:4321"
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"
    networks:
      - auditor-network
    depends_on:
      - backend

  # --- ADDED: LIGHTWEIGHT REDIS CACHE POD ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - auditor-network
    volumes:
      - redis-data:/data

networks:
  auditor-network:
    driver: bridge

volumes:
  redis-data:
    driver: local